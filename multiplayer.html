// ============================================
// SCOREBOARD
// ============================================
function showScoreboard() {
  // Sort by score descending
  const sorted = [...hostPlayers].sort((a, b) => b.score - a.score || a.drinks - b.drinks);

  const scoresMsg = {
    type: 'scores',
    players: sorted.map(p => ({ name: p.name, score: p.score, drinks: p.drinks, peerId: p.peerId })),
    mode: gameMode
  };

  broadcast(scoresMsg);
  renderScoreboardScreen(scoresMsg);
}

function renderScoreboardScreen(data) {
  showScreen('scoreboard-screen');
  const el = document.getElementById('scoreboard-screen');
  const modeNames = {
    'swipe': 'Swipe It', 'rate': 'Rate It', 'where': 'Donde Estaba?',
    'higher-lower': 'Mas o Menos', 'closest': 'La Escala de Javier',
    'bingo': 'Javier Bingo', 'tribunal': 'El Tribunal de Javier',
    'owner-guess': 'Quien lo escribio?',
    'review-match': 'De quien es la review?'
  };

  const rankEmojis = ['&#129351;', '&#129352;', '&#129353;'];

  el.innerHTML = `
    <div style="font-size:3rem;margin-bottom:8px;">&#127942;</div>
    <div class="sb-title">Puntuaciones</div>
    <div class="sb-subtitle">${modeNames[data.mode] || data.mode}</div>
    <div class="sb-list">
      ${data.players.map((p, i) => `
        <div class="sb-row ${i === 0 ? 'first' : ''}">
          <div class="sb-rank">${i < 3 ? rankEmojis[i] : (i + 1)}</div>
          <div class="sb-player-info">
            <div class="sb-player-name">${escapeHtml(p.name)} ${p.peerId === myPeerId ? '(tu)' : ''}</div>
            <div class="sb-player-drinks">${getDrinkEmoji()} ${p.drinks} tragos</div>
          </div>
          <div class="sb-score">${p.score} pts</div>
        </div>
      `).join('')}
    </div>
    ${isHost ? `
      <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;">
        <button class="big-btn primary" onclick="showModeSelect()">Otro Juego</button>
        <button class="big-btn secondary" onclick="backToLobby()">Volver al Lobby</button>
      </div>
    ` : `
      <div class="waiting-msg">El host elige el siguiente juego...</div>
    `}
  `;

  if (data.players.length > 0 && data.players[0].peerId === myPeerId) {
    showConfetti();
  }
}

function renderPlayerScoreboard(data) {
  renderScoreboardScreen(data);
}

function backToLobby() {
  broadcast({ type: 'return-lobby', players: hostPlayers.map(p => ({ name: p.name, score: p.score, drinks: p.drinks, disconnected: p.disconnected, peerId: p.peerId })) });
  renderLobby();
}

function goAppHome() {
  closeSettingsMenu();
  try { if (hostConn) hostConn.close(); } catch (e) {}
  Object.values(connections).forEach(conn => { try { conn.close(); } catch (e) {} });
  try { if (peer) peer.destroy(); } catch (e) {}
  peer = null;
  hostConn = null;
  connections = {};
  isHost = false;
  roomCode = '';
  myPeerId = '';
  hostPlayers = [];
  gameMode = '';
  gameReviews = [];
  currentRound = 0;
  roundAnswers = {};
  roundTimestamps = {};
  roundActive = false;
  myScore = 0;
  myDrinks = 0;
  myBingoCard = null;
  playerAnswered = false;
  document.getElementById('headerInfo').innerHTML = '';
  showScreen('landing-screen');
  setStatus('');
}

// ============================================
// RENDER CURRENT VIEW (for reconnection)
// ============================================
function renderCurrentView() {
  // Just re-render lobby if we're in lobby
  const activeScreen = document.querySelector('.screen.active');
  if (activeScreen && activeScreen.id === 'lobby-screen' && isHost) {
    renderLobby();
  }
}

// ============================================
// EFFECTS
// ============================================
function showDrinkOverlay() {
  const overlay = document.createElement('div');
  overlay.className = 'drink-overlay';
  overlay.innerHTML = `<div class="drink-emoji">${getDrinkEmoji()}</div><div class="drink-text">BEBE!</div>`;
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1200);
}

function showConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#ff2d78','#7b2dff','#00f0ff','#ffd700','#00e676','#ff6b35','#ff4ecb'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 5) + 'px';
    piece.style.height = (Math.random() * 8 + 5) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 2500);
}

// ============================================
window.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#', '').trim();
  if (hash.length === 4) {
    document.getElementById('roomCodeInput').value = hash.toUpperCase();
  }
});

// Update tribunal timer on player side
const _origHandlePlayerMessage = handlePlayerMessage;
handlePlayerMessage = function(msg) {
  if (msg.type === 'tribunal-timer') {
    const el = document.getElementById('tribunalTimer');
    if (el) el.textContent = msg.time;
    return;
  }
  _origHandlePlayerMessage(msg);
};
